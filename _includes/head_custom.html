<script> document.addEventListener("DOMContentLoaded", function() { document.querySelectorAll('script[type^="math/tex"]').forEach(function(el) { var text = el.textContent; var display = el.type.includes('display'); var span = document.createElement('span'); try { katex.render(text, span, { displayMode: display, throwOnError: false }); el.parentNode.replaceChild(span, el); } catch (err) { console.error(err); } }); renderMathInElement(document.body, { delimiters: [ {left: "$$", right: "$$", display: true}, {left: "\\[", right: "\\]", display: true}, {left: "$", right: "$", display: false}, {left: "\\(", right: "\\)", display: false} ], throwOnError : false }); }); </script>
